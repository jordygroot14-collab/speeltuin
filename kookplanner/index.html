<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Jordy &amp; Kelly's Kookplanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE6D2;
    --paper-dark:#E4D8BB;
    --card:#FBF6EC;
    --ink:#2E2A22;
    --ink-soft:#786F5C;
    --pantry:#3F5443;
    --pantry-dark:#2A3A2D;
    --pantry-light:#557057;
    --stamp:#A8492E;
    --mustard:#CE9A35;
    --leaf:#4C7A50;
    --line:#D6C79E;
    --white:#FFFDF8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle, rgba(46,42,34,0.06) 1px, transparent 1px) 0 0/16px 16px,
      var(--paper);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:calc(84px + env(safe-area-inset-bottom));}

  .lockscreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;padding-top:calc(24px + env(safe-area-inset-top));padding-bottom:calc(24px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto;}
  .lockbox{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:32px 28px;text-align:center;width:100%;box-shadow:0 4px 0 rgba(46,42,34,0.08);}
  .lockicon{font-size:36px;margin-bottom:6px;}
  .lockbox h1{font-family:'Caveat',cursive;font-size:32px;margin:0 0 6px;color:var(--pantry-dark);}
  .lockbox p{font-size:13.5px;color:var(--ink-soft);margin:0 0 16px;}
  .lockbox input{text-align:center;}

  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--pantry);
    color:var(--white);
    padding:18px 18px 14px;
    padding-top:calc(18px + env(safe-area-inset-top));
    border-bottom:3px solid var(--pantry-dark);
    box-shadow:0 3px 0 rgba(0,0,0,0.08);
  }
  .hublink{color:rgba(255,255,255,0.75);text-decoration:none;font-size:19px;flex:0 0 auto;margin-top:2px;}
  .topbar-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .topbar-actions{display:flex;gap:8px;flex:0 0 auto;}
  .importbtn{
    flex:0 0 auto;background:rgba(255,255,255,0.15);border:none;color:var(--white);
    width:38px;height:38px;border-radius:8px;font-size:18px;cursor:pointer;margin-top:2px;
  }
  .backup-section{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:14px;margin-top:14px;}
  .backup-section h4{font-family:'Caveat',cursive;font-size:19px;margin:0 0 6px;color:var(--pantry-dark);}
  .backup-section p{font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;line-height:1.4;}
  .filelabel{display:inline-block;background:var(--card);border:1.5px solid var(--line);border-radius:5px;
    padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--pantry-dark);cursor:pointer;text-align:center;width:100%;}
  .filelabel input{display:none;}
  .import-intro{font-size:13.5px;color:var(--ink-soft);margin-bottom:12px;line-height:1.4;}
  .import-error{background:#F5E2DA;border:1px solid var(--stamp);color:var(--stamp);border-radius:6px;
    padding:9px 11px;font-size:13px;margin-top:10px;}
  .import-loading{display:flex;align-items:center;gap:8px;color:var(--pantry-dark);font-size:13.5px;margin-top:12px;}
  .spinner{width:16px;height:16px;border:2.5px solid var(--line);border-top-color:var(--pantry);border-radius:50%;
    animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .topbar h1{font-family:'Caveat',cursive;font-weight:700;font-size:32px;margin:0;line-height:1;letter-spacing:0.3px;}
  .topbar .sub{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#CFE0D0;margin-top:4px;}

  .tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    max-width:480px;margin:0 auto;display:flex;
    background:var(--pantry-dark);border-top:2px solid var(--pantry);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{flex:1;text-align:center;padding:11px 4px 9px;color:#A9BFAB;background:none;border:none;
    font-family:'Work Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
  .tab .icon{display:block;font-size:20px;margin-bottom:2px;}
  .tab.active{color:var(--white);border-top:3px solid var(--mustard);margin-top:-2px;padding-top:9px;}

  main{padding:16px;}

  .chiprow{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;-webkit-overflow-scrolling:touch;}
  .chiprow::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;font-family:'Work Sans',sans-serif;font-size:12.5px;font-weight:600;
    padding:7px 13px;border-radius:3px 3px 8px 8px;
    background:var(--card);border:1.5px solid var(--line);color:var(--ink-soft);
    cursor:pointer;white-space:nowrap;position:relative;
  }
  .chip::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%) rotate(-2deg);
    width:20px;height:9px;background:rgba(206,154,53,0.35);}
  .chip.active{background:var(--pantry);border-color:var(--pantry-dark);color:var(--white);}
  .chip.active::before{background:rgba(255,255,255,0.4);}

  .datefilter-toggle{background:none;border:none;color:var(--pantry-dark);font-size:12px;font-weight:600;
    cursor:pointer;padding:0 2px 12px;text-decoration:underline;text-underline-offset:2px;}
  .datefilter{display:flex;gap:8px;align-items:flex-end;background:var(--card);border:1px solid var(--line);
    border-radius:6px;padding:10px 12px;margin-bottom:14px;}
  .datefilter div{flex:1;}
  .datefilter label{margin:0 0 4px;font-size:10px;}
  .datefilter input{padding:7px 8px;font-size:13px;}
  .datefilter button{flex:0 0 auto;background:none;border:1px solid var(--line);border-radius:5px;
    padding:8px 10px;font-size:12px;color:var(--stamp);cursor:pointer;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:4px;overflow:hidden;cursor:pointer;
    position:relative;box-shadow:0 2px 0 rgba(46,42,34,0.06);}
  .rcard .photo{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--paper-dark);}
  .rcard .noimg{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:34px;background:var(--paper-dark);color:var(--ink-soft);}
  .rcard .body{padding:9px 10px 11px;}
  .rcard h3{font-family:'Caveat',cursive;font-weight:700;font-size:19px;margin:0 0 3px;line-height:1.05;color:var(--pantry-dark);}
  .rcard .meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-soft);display:flex;gap:8px;}
  .rcard .lastmade{font-size:10px;color:var(--ink-soft);margin-top:3px;font-family:'Work Sans',sans-serif;}
  .rcard .cat{position:absolute;top:7px;left:7px;background:var(--pantry);color:var(--white);
    font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:3px 7px;border-radius:2px 2px 6px 6px;}
  .stamp{position:absolute;top:6px;right:6px;width:46px;height:46px;border-radius:50%;
    border:2px dashed var(--stamp);display:flex;align-items:center;justify-content:center;transform:rotate(-9deg);
    background:rgba(251,246,236,0.88);font-family:'JetBrains Mono',monospace;color:var(--stamp);
    font-weight:700;font-size:12px;line-height:1.05;text-align:center;}
  .stamp small{display:block;font-size:6.5px;letter-spacing:0.5px;font-weight:700;}

  .empty{text-align:center;padding:50px 20px;color:var(--ink-soft);font-family:'Work Sans',sans-serif;}
  .empty .big{font-family:'Caveat',cursive;font-size:26px;color:var(--pantry-dark);display:block;margin-bottom:6px;}

  .fab{position:fixed;right:calc(50% - 240px + 18px);bottom:calc(96px + env(safe-area-inset-bottom));z-index:25;width:54px;height:54px;border-radius:8px;
    background:var(--stamp);color:var(--white);border:none;font-size:26px;font-weight:700;cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);transform:rotate(-3deg);}
  @media (max-width:520px){ .fab{right:18px;} }

  .overlay{position:fixed;inset:0;background:var(--paper);z-index:50;max-width:480px;margin:0 auto;overflow-y:auto;}
  .ov-header{position:sticky;top:0;background:var(--pantry);color:var(--white);padding:14px 16px;
    padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;align-items:center;gap:10px;z-index:5;}
  .ov-header button{background:rgba(255,255,255,0.15);border:none;color:var(--white);
    width:32px;height:32px;border-radius:6px;font-size:16px;cursor:pointer;}
  .ov-header h2{font-family:'Caveat',cursive;font-size:24px;margin:0;flex:1;font-weight:700;}
  .ov-body{padding:16px 16px 40px;}

  .detail-photo{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:6px;border:1px solid var(--line);}
  .detail-meta{display:flex;gap:10px;margin:12px 0;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;}
  .detail-meta span{background:var(--card);padding:5px 9px;border-radius:4px;border:1px solid var(--line);}

  .servstepper{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:6px;padding:10px 12px;margin-bottom:4px;}
  .servstepper label{margin:0;flex:1;}
  .servstepper button{background:var(--pantry);color:var(--white);border:none;width:30px;height:30px;
    border-radius:5px;font-size:16px;cursor:pointer;}
  .servstepper .val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--pantry-dark);width:26px;text-align:center;}
  .scale-note{font-size:11px;color:var(--ink-soft);font-style:italic;margin:6px 0 0;}

  .comp-block{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px 14px;}
  .comp-block h4{font-family:'Caveat',cursive;font-size:20px;margin:0 0 8px;color:var(--pantry-dark);}
  .comp-block ul{margin:0 0 12px;padding-left:18px;}
  .comp-block li{margin-bottom:4px;font-size:14px;}
  .comp-block ol{margin:0;padding-left:20px;}
  .comp-block ol li{margin-bottom:9px;font-size:14px;line-height:1.4;}
  .ing-missing{color:var(--stamp);font-weight:600;}
  .ing-match{color:var(--leaf);font-weight:600;}

  .actionrow{display:flex;gap:10px;margin-top:18px;}
  .btn{font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;padding:10px 16px;border-radius:5px;border:none;cursor:pointer;}
  .btn-primary{background:var(--pantry);color:var(--white);}
  .btn-danger{background:var(--stamp);color:var(--white);}
  .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);}
  .btn-block{width:100%;}

  label{display:block;font-size:12px;font-weight:700;color:var(--pantry-dark);
    text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 5px;}
  input[type=text],input[type=number],input[type=date],input[type=password],select,textarea{
    width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:5px;
    background:var(--card);font-family:'Work Sans',sans-serif;font-size:16px;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--pantry-light);outline-offset:1px;}
  .row2{display:flex;gap:10px;}
  .row2 > div{flex:1;}
  .photo-upload{margin-top:6px;border:2px dashed var(--line);border-radius:6px;padding:14px;text-align:center;background:var(--card);}
  .photo-upload img{width:100%;border-radius:5px;margin-bottom:8px;}
  .photo-upload input[type=file]{width:100%;}
  .comp-form{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px;}
  .comp-form-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .ing-row{display:flex;gap:6px;margin-bottom:6px;}
  .ing-row input:first-child{flex:0 0 78px;}
  .step-row{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start;}
  .step-row span{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);padding-top:10px;width:16px;}
  .rowbtn{background:none;border:1px solid var(--line);border-radius:4px;width:32px;height:38px;cursor:pointer;color:var(--stamp);font-weight:700;flex:0 0 32px;}
  .addlink{background:none;border:none;color:var(--pantry);font-weight:700;font-size:13px;cursor:pointer;padding:6px 0;text-align:left;}
  .removecomp{background:none;border:none;color:var(--stamp);font-size:12px;font-weight:700;cursor:pointer;}

  .pantry-box{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px 14px 14px;margin-bottom:16px;}
  .pantry-box label{margin-top:0;}
  .tagrow{display:flex;gap:8px;margin-top:6px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .tag{background:var(--pantry);color:var(--white);font-size:12.5px;font-weight:600;padding:5px 8px 5px 10px;
    border-radius:12px;display:flex;align-items:center;gap:6px;}
  .tag button{background:none;border:none;color:var(--white);opacity:0.75;cursor:pointer;font-size:13px;padding:0;}
  .missing-line{font-size:11px;color:var(--ink-soft);padding:6px 10px 0;font-family:'Work Sans',sans-serif;}
  .missing-line b{color:var(--stamp);}
  .voorraad-link{background:none;border:none;color:var(--pantry-dark);font-size:12.5px;font-weight:600;
    cursor:pointer;padding:4px 0 0;text-decoration:underline;text-underline-offset:2px;display:block;}

  .weeknav{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:6px;padding:10px 12px;margin-bottom:16px;}
  .weeknav button{background:var(--pantry);color:var(--white);border:none;width:30px;height:30px;border-radius:5px;font-size:16px;cursor:pointer;}
  .weeknav .wk{flex:1;text-align:center;font-family:'Caveat',cursive;font-size:20px;font-weight:700;color:var(--pantry-dark);}
  .plan-item{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:12px;}
  .plan-item-top{display:flex;gap:10px;align-items:center;}
  .plan-item-top img{width:56px;height:56px;object-fit:cover;border-radius:5px;}
  .plan-item-top .noimg{width:56px;height:56px;border-radius:5px;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 56px;}
  .plan-item h4{font-family:'Caveat',cursive;font-size:19px;margin:0 0 2px;color:var(--pantry-dark);}
  .plan-item .cat-lbl{font-size:11px;color:var(--ink-soft);}
  .plan-item .rm{margin-left:auto;background:none;border:none;color:var(--stamp);font-size:18px;cursor:pointer;padding:0 2px;align-self:flex-start;}
  .kelly-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .kelly-row label{margin:0;flex:0 0 auto;}
  .kelly-row input{width:74px;}
  .shoplist{background:var(--paper-dark);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-top:6px;}
  .shoplist h3{font-family:'Caveat',cursive;font-size:20px;margin:0 0 8px;color:var(--pantry-dark);}
  .shop-check{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
  .shop-check:last-child{border-bottom:none;}
  .shop-check input{width:17px;height:17px;flex:0 0 auto;}
  .shop-check.checked span{text-decoration:line-through;color:var(--ink-soft);}
  .weekavg{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--pantry-dark);
    background:var(--card);border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin-bottom:14px;
    display:flex;justify-content:space-between;}
  .weekavg b{color:var(--mustard);font-size:16px;}

  .month-toggle{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);
    border-radius:6px;padding:11px 14px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;
    color:var(--pantry-dark);cursor:pointer;margin-top:18px;}
  .month-table{margin-top:10px;}
  .month-row{display:grid;grid-template-columns:1fr 90px 44px 16px;align-items:center;gap:8px;
    margin-bottom:5px;cursor:pointer;padding:4px 0;}
  .month-row .mname{font-family:'Caveat',cursive;font-size:17px;color:var(--pantry-dark);font-weight:700;}
  .month-row .bar-bg{background:var(--paper-dark);border-radius:3px;height:10px;overflow:hidden;}
  .month-row .bar-fill{background:var(--mustard);height:100%;border-radius:3px;}
  .month-row .mval{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--pantry-dark);text-align:right;}
  .month-row .arrow{font-size:10px;color:var(--ink-soft);text-align:center;}
  .month-weeks{padding:2px 0 10px 4px;margin-bottom:6px;}
  .month-weeks div{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);padding:2px 0 2px 14px;}
  .month-weeks b{color:var(--pantry-dark);}

  .picker-list{max-height:none;}
  .picker-item{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);
    border-radius:6px;padding:9px 10px;margin-bottom:8px;cursor:pointer;}
  .picker-item img{width:44px;height:44px;object-fit:cover;border-radius:4px;}
  .picker-item .noimg{width:44px;height:44px;border-radius:4px;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 44px;}
  .picker-item .nm{font-family:'Caveat',cursive;font-size:18px;color:var(--pantry-dark);font-weight:700;}
  .picker-item .cat-lbl{font-size:11px;color:var(--ink-soft);}
  .picker-item .time{margin-left:auto;font-size:11.5px;color:var(--ink-soft);flex:0 0 auto;}

  .confirm-overlay{position:fixed;inset:0;background:rgba(46,42,34,0.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;padding-top:calc(20px + env(safe-area-inset-top));padding-bottom:calc(20px + env(safe-area-inset-bottom));}
  .confirm-box{background:var(--card);border-radius:8px;padding:20px;max-width:340px;text-align:center;}
  .confirm-box p{font-size:14.5px;margin:0 0 16px;}
  .confirm-box .actionrow{margin-top:0;}
</style>

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function normalize(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
  function formatNL(num, decimals){
    decimals = decimals === undefined ? 1 : decimals;
    return Number(num).toFixed(decimals).replace('.', ',').replace(/,0$/, '');
  }

  function mondayOf(d){
    const x = new Date(d); const day = x.getDay() || 7;
    if(day !== 1) x.setDate(x.getDate() - (day - 1));
    x.setHours(0,0,0,0);
    return x;
  }
  function sundayOf(monday){ const x = new Date(monday); x.setDate(x.getDate()+6); return x; }
  function isoWeekNumber(date){
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }
  function weekKeyFor(monday){ return monday.toISOString().slice(0,10); }
  function weekLabelFor(monday){
    const sunday = sundayOf(monday);
    const wn = isoWeekNumber(monday);
    const mM = monday.getMonth(), sM = sunday.getMonth();
    const range = (mM === sM)
      ? `${monday.getDate()} t/m ${sunday.getDate()} ${MONTHS_NL[sM]}`
      : `${monday.getDate()} ${MONTHS_NL[mM]} t/m ${sunday.getDate()} ${MONTHS_NL[sM]}`;
    return `Week ${wn} (${range})`;
  }
  function formatDateNL(iso){
    if(!iso) return null;
    const d = new Date(iso + 'T00:00:00');
    if(isNaN(d)) return null;
    return `${d.getDate()} ${MONTHS_NL[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
  }

  function flattenIngredientObjs(recipe){
    let out = [];
    (recipe.components||[]).forEach(c => (c.ingredients||[]).forEach(i => {
      if(i.name && i.name.trim()) out.push({amount: i.amount || '', name: i.name.trim()});
    }));
    return out;
  }
  function flattenIngredients(recipe){ return flattenIngredientObjs(recipe).map(i => i.name); }

  function matchesAny(name, list){
    const n = normalize(name);
    return list.some(p => { const pn = normalize(p); return pn && (n.includes(pn) || pn.includes(n)); });
  }
  function matchStats(recipe){
    const all = flattenIngredients(recipe);
    if(!all.length) return {percent:0, missing:[], matched:[]};
    const matched = [], missing = [];
    all.forEach(name => {
      const isMatch = matchesAny(name, state.pantry) || matchesAny(name, state.voorraadkast);
      (isMatch ? matched : missing).push(name);
    });
    return {percent: Math.round((matched.length/all.length)*100), missing, matched};
  }

  // ---- amount parsing / scaling ----
  function parseAmount(str){
    const s = (str||'').trim();
    if(!s) return {qty:null, unit:'', raw:s, isRange:false};
    let m = s.match(/^(\d+(?:[.,]\d+)?)\s*\/\s*(\d+(?:[.,]\d+)?)\s*([a-zA-Zéëïóôû]*)/);
    if(m){
      const n1 = parseFloat(m[1].replace(',','.'));
      const n2 = parseFloat(m[2].replace(',','.'));
      return {qty:(n1+n2)/2, n1, n2, unit:(m[3]||'').toLowerCase(), raw:s, isRange:true};
    }
    m = s.match(/^(\d+(?:[.,]\d+)?)\s*([a-zA-Zéëïóôû]*)/);
    if(m){
      return {qty: parseFloat(m[1].replace(',','.')), unit:(m[2]||'').toLowerCase(), raw:s, isRange:false};
    }
    return {qty:null, unit:'', raw:s, isRange:false};
  }
  function scaleAmountString(amountStr, factor){
    if(!amountStr || !amountStr.trim() || factor === 1) return {text: amountStr, scaled:false};
    const p = parseAmount(amountStr);
    if(p.qty === null) return {text: amountStr, scaled:false};
    if(p.isRange){
      const a = formatNL(p.n1*factor,1), b = formatNL(p.n2*factor,1);
      return {text: `${a}/${b}${p.unit?' '+p.unit:''}`, scaled:true};
    }
    return {text: `${formatNL(p.qty*factor,1)}${p.unit?' '+p.unit:''}`, scaled:true};
  }

  function emptyComponent(){ return {name:'', ingredients:[{amount:'',name:''}], steps:['']}; }
  function newDraft(){

  async function startSync(){
    try{
      await new Promise((resolve, reject) => {
        onAuthStateChanged(auth, (user) => { if(user) resolve(); }, reject);
        signInAnonymously(auth).catch(reject);
      });
    }catch(e){
      state.authError = 'Kon geen verbinding maken met de sync-server. Controleer je internetverbinding en probeer het opnieuw.';
      state.loading = false;
      render();
      return;
    }

    recipesUnsub = onSnapshot(householdCol('recipes'), async (snap) => {
      state.recipes = snap.docs.map(d => ({...d.data(), id: d.id}));
      if(firstRecipesSnapshot){
        firstRecipesSnapshot = false;
        if(state.recipes.length === 0){
          const seed = seedRecipe();
          try{ await setDoc(householdRef('recipes', seed.id), seed); }catch(e){ console.error('seed opslaan mislukt', e); }
        }
      }

  function compressImage(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Kan bestand niet lezen'));
      reader.onload = (e) => {
        const img = new Image();
        img.onerror = () => reject(new Error('Kan afbeelding niet laden'));
        img.onload = () => {
          const maxW = 800;
          const scale = Math.min(1, maxW / img.width);
          const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function doImportRecipe(){
    const ta = document.getElementById('importText');
    const text = ta ? ta.value.trim() : '';
    if(!text){ state.importError = 'Plak eerst de tekst van een recept.'; render(); return; }

    state.importLoading = true; state.importError = null; render();

    const prompt = `Je krijgt platte tekst van een receptpagina of notitie. Haal er gestructureerde receptdata uit en antwoord UITSLUITEND met geldige JSON (geen uitleg, geen markdown-backticks, geen inleidende tekst). Gebruik exact dit formaat:
{"title":"string","category":"een van: Hoofdgerecht, Voorgerecht, BBQ, Bijgerecht, Lunch, Soep, Salade, Smeersel, Dessert","prepTime": getal in minuten of null,"servings": getal of null,"components":[{"name":"string (leeg als er maar 1 onderdeel is)","ingredients":[{"amount":"string, leeg als niet van toepassing","name":"string"}],"steps":["string", "string"]}]}
Regels: schrijf alles in het Nederlands. Als het recept meerdere losse onderdelen heeft (bijv. hoofdgerecht + saus + bijgerecht), maak dan meerdere components. Splits ingrediënten in amount (hoeveelheid) en name (het ingrediënt zelf). Behoud de originele bereidingsstappen zo veel mogelijk, desnoods iets ingekort.

Tekst:
"""${text}"""`;

    try{
      const resp = await fetch("https://kookplanner-proxy.jordygroot14.workers.dev/", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{role:"user", content: prompt}]
        })
      });

      let data;
      try{ data = await resp.json(); }
      catch(parseRespErr){ throw new Error(`Server gaf geen leesbaar antwoord (HTTP ${resp.status}).`); }

      if(!resp.ok || data.type === 'error'){
        const msg = data?.error?.message || `HTTP ${resp.status}`;
        throw new Error(`API-fout: ${msg}`);
      }

      const textOut = (data.content||[]).filter(b => b.type==='text').map(b => b.text).join('\n');
      if(!textOut.trim()){
        throw new Error('Claude gaf geen tekstantwoord terug (mogelijk gestopt door een tool-aanroep of leeg antwoord).');
      }
      const clean = textOut.replace(/```json|```/g,'').trim();

      let parsed;
      try{ parsed = JSON.parse(clean); }
      catch(jsonErr){ throw new Error(`Antwoord was geen geldige JSON (${jsonErr.message}). Eerste 120 tekens: "${clean.slice(0,120)}"`); }

      const draft = newDraft();
      draft.title = parsed.title || '';
      draft.category = CATEGORIES.includes(parsed.category) ? parsed.category : CATEGORIES[0];
      draft.prepTime = parsed.prepTime || '';
      draft.servings = parsed.servings || '';
      draft.components = (parsed.components && parsed.components.length) ? parsed.components.map(c => ({
        name: c.name || '',
        ingredients: (c.ingredients && c.ingredients.length) ? c.ingredients.map(i => ({amount:i.amount||'', name:i.name||''})) : [{amount:'',name:''}],
        steps: (c.steps && c.steps.length) ? c.steps : ['']
      })) : [emptyComponent()];

      state.importOpen = false;
      state.importLoading = false;
      state.formDraft = draft;
      state.formEditingId = null;
      state.formError = null;
      render();
    }catch(err){
      state.importLoading = false;
      state.importError = 'Import mislukt — ' + (err && err.message ? err.message : 'onbekende fout') + '. Probeer het opnieuw of plak minder tekst.';
      render();
    }
  }

  function aggregateWeekIngredients(wp){
    const groups = {};
    const order = [];
    wp.items.forEach(item => {
      const r = state.recipes.find(x => x.id === item.recipeId);
      if(!r) return;
      flattenIngredientObjs(r).forEach(ing => {
        const key = normalize(ing.name);
        if(!groups[key]){ groups[key] = {name: ing.name, entries: []}; order.push(key); }
        groups[key].entries.push(parseAmount(ing.amount));
      });
    });
    const result = [];
    order.forEach(key => {
      const g = groups[key];
      const parseable = g.entries.every(e => e.qty !== null);
      const sameUnit = parseable && g.entries.every(e => e.unit === g.entries[0].unit);
      if(parseable && sameUnit){
        let total = g.entries.reduce((s,e) => s + e.qty, 0);
        const unit = g.entries[0].unit;
        if(unit === '') total = Math.ceil(total);
        const label = `${formatNL(total,1)}${unit?(' '+unit):''} ${g.name}`.trim();
        result.push({key, label, name: g.name, checked: wp.ownedNames.includes(key)});
      } else {
        g.entries.forEach((e,i) => {
          const k2 = key + '#' + i;
          const label = `${e.raw ? e.raw+' ' : ''}${g.name}`.trim();
          result.push({key:k2, label, name: g.name, checked: wp.ownedNames.includes(k2)});
        });
      }
    });
    return result.filter(item => !matchesAny(item.name, state.voorraadkast));
  }

    if(g('title')) d.title = g('title').value;
    if(g('category')) d.category = g('category').value;
    if(g('prepTime')) d.prepTime = g('prepTime').value;
    if(g('servings')) d.servings = g('servings').value;
    if(g('lastMade')) d.lastMade = g('lastMade').value;
    d.components.forEach((c, ci) => {
      const cn = g(`compName-${ci}`); if(cn) c.name = cn.value;
      c.ingredients.forEach((ing, ii) => {
        const a = g(`ingAmount-${ci}-${ii}`); const n = g(`ingName-${ci}-${ii}`);
        if(a) ing.amount = a.value;
        if(n) ing.name = n.value;
      });
      c.steps.forEach((s, si) => {
        const st = g(`step-${ci}-${si}`);
        if(st) c.steps[si] = st.value;
      });
    });
  }

  function passesDateFilter(r){

  function render(){
    const app = document.getElementById('app');
    if(!state.unlocked){
      app.innerHTML = renderLockScreen();
      return;
    }
    if(state.authError){
      app.innerHTML = `<div class="empty" style="padding-top:120px;"><span class="big">Kon niet verbinden</span>${escapeHtml(state.authError)}</div>`;
      return;
    }
    if(state.loading){
      app.innerHTML = `<div class="empty" style="padding-top:120px;"><span class="big">Kookplanner wordt geladen&hellip;</span></div>`;
      return;
    }

    // preserve scroll position (overlay scrolls internally, main page scrolls the window)
    const prevOverlay = app.querySelector('.overlay');
    const prevOverlayScroll = prevOverlay ? prevOverlay.scrollTop : null;
    const prevWindowScroll = window.scrollY;

    let html = '';
    html += renderTopbar();
    html += `<main>${renderView()}</main>`;
    html += renderTabbar();
    if(state.detailId) html += renderDetailOverlay();
    if(state.formDraft) html += renderFormOverlay();
    if(state.pickerOpen) html += renderPickerOverlay();
    if(state.importOpen) html += renderImportOverlay();
    if(state.backupOpen) html += renderBackupOverlay();
    if(state.voorraadkastOpen) html += renderVoorraadkastOverlay();
    if(state.confirm) html += renderConfirm();
    app.innerHTML = html;

    const newOverlay = app.querySelector('.overlay');
    if(newOverlay && prevOverlayScroll !== null){
      newOverlay.scrollTop = prevOverlayScroll;
    } else if(!newOverlay){
      window.scrollTo(0, prevWindowScroll);
    }

    if(state.focusAfterRender){
      const target = app.querySelector(state.focusAfterRender);
      if(target){
        target.focus();
        if(typeof target.setSelectionRange === 'function'){
          try{ const len = target.value.length; target.setSelectionRange(len, len); }catch(e){}
        }
      }
      state.focusAfterRender = null;
    }
  }

              <h4>${escapeHtml(r.title)}</h4>

              data-act="setkelly" data-key="${key}" data-itemid="${item.id}">
          </div>
        </div>`;
      }).join('');

      const shop = aggregateWeekIngredients(wp);
      body += `<div class="shoplist"><h3>🛒 Boodschappenlijst deze week</h3>
        ${shop.length ? shop.map(it => `
          <label class="shop-check ${it.checked?'checked':''}">

      </div>`;
    }

    body += `<button class="btn btn-primary btn-block" style="margin-top:16px;" data-act="openpicker">+ Recept toevoegen aan deze week</button>`;
    body += `<button class="month-toggle" data-act="togglemonth">${state.monthOverviewOpen ? '▾' : '▸'} Maandoverzicht Kelly's cijfer</button>`;
    if(state.monthOverviewOpen) body += renderMonthOverview();

    return body;
  }

  function renderMonthOverview(){
    const buckets = {};
    Object.values(state.weekplans).forEach(wp => {
      const monday = new Date(wp.monday);
      const mk = `${monday.getFullYear()}-${monday.getMonth()}`;
      const wn = isoWeekNumber(monday);
      wp.items.forEach(it => {
        if(it.kellyScore === null || it.kellyScore === undefined || it.kellyScore === '') return;
        if(!buckets[mk]) buckets[mk] = {year:monday.getFullYear(), month:monday.getMonth(), weeks:{}, all:[]};
        if(!buckets[mk].weeks[wn]) buckets[mk].weeks[wn] = [];
        buckets[mk].weeks[wn].push(parseFloat(it.kellyScore));
        buckets[mk].all.push(parseFloat(it.kellyScore));
      });
    });
    const rows = Object.entries(buckets).map(([mk,b]) => ({mk, ...b})).sort((a,b) => (a.year-b.year) || (a.month-b.month));
    if(!rows.length){
      return `<div class="empty" style="padding:24px 10px;"><span class="big">Nog geen cijfers</span>Zodra je recepten beoordeelt, verschijnt hier het maandgemiddelde.</div>`;
    }
    return `<div class="month-table">${rows.map(r => {
      const avg = r.all.reduce((s,x)=>s+x,0)/r.all.length;
      const expanded = state.expandedMonths.includes(r.mk);
      const weekRows = Object.keys(r.weeks).map(Number).sort((a,b)=>a-b).map(wn => {
        const scores = r.weeks[wn];
        const wavg = scores.reduce((s,x)=>s+x,0)/scores.length;
        return `<div>&gt; Week ${wn} = <b>${formatNL(wavg,1)}</b></div>`;
      }).join('');
      return `<div>
        <div class="month-row" data-act="togglemonthrow" data-mk="${r.mk}">
          <div class="mname">${MONTHS_NL[r.month]} ${r.year}</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${(avg/10*100).toFixed(0)}%"></div></div>
          <div class="mval">${formatNL(avg,1)}</div>
          <div class="arrow">${expanded?'▾':'▸'}</div>
        </div>
        ${expanded ? `<div class="month-weeks">${weekRows}</div>` : ''}
      </div>`;
    }).join('')}</div>`;
  }

  // ---------- EVENTS ----------
  document.addEventListener('click', async (e) => {
    const el = e.target.closest('[data-act]');
    if(!el) return;
    const act = el.dataset.act;

    if(act === 'setview'){ state.view = el.dataset.view; render(); }
    else if(act === 'filtercat'){ state.catFilter = el.dataset.cat; render(); }
    else if(act === 'filtermatchercat'){ state.matcherCatFilter = el.dataset.cat; render(); }
    else if(act === 'toggledatefilter'){ state.dateFilterOpen = !state.dateFilterOpen; render(); }
    else if(act === 'cleardatefilter'){ state.dateFrom=''; state.dateTo=''; render(); }
    else if(act === 'opendetail'){ state.detailId = el.dataset.id; state.detailServings = null; render(); }
    else if(act === 'closedetail'){ state.detailId = null; render(); }
    else if(act === 'servmin'){
      const r = state.recipes.find(x => x.id === state.detailId);
      const base = parseFloat(r.servings) || 1;
      const cur = state.detailServings || base;
      state.detailServings = Math.max(1, cur - 1);
      render();
    }
    else if(act === 'servplus'){
      const r = state.recipes.find(x => x.id === state.detailId);
      const base = parseFloat(r.servings) || 1;
      const cur = state.detailServings || base;
      state.detailServings = cur + 1;
      render();
    }
    else if(act === 'newrecipe'){ state.formDraft = newDraft(); state.formEditingId = null; state.formError = null; render(); }
    else if(act === 'editrecipe'){
      const r = state.recipes.find(x => x.id === el.dataset.id);
      state.formDraft = JSON.parse(JSON.stringify(r));
      if(state.formDraft.lastMade === undefined) state.formDraft.lastMade = '';
      state.formEditingId = r.id;
      state.formError = null;
      state.detailId = null;
      render();
    }
    else if(act === 'closeform'){ state.formDraft = null; state.formEditingId = null; state.formError = null; render(); }
    else if(act === 'addcomp'){ syncDraftFromForm(); state.formDraft.components.push(emptyComponent()); render(); }
    else if(act === 'rmcomp'){ syncDraftFromForm(); state.formDraft.components.splice(+el.dataset.ci,1); render(); }
    else if(act === 'adding'){
      syncDraftFromForm();
      const ci = +el.dataset.ci;
      state.formDraft.components[ci].ingredients.push({amount:'',name:''});
      state.focusAfterRender = `[name="ingAmount-${ci}-${state.formDraft.components[ci].ingredients.length-1}"]`;
      render();
    }
    else if(act === 'rming'){
      syncDraftFromForm();
      const c = state.formDraft.components[+el.dataset.ci];
      if(c.ingredients.length>1) c.ingredients.splice(+el.dataset.ii,1);
      render();
    }
    else if(act === 'addstep'){
      syncDraftFromForm();
      const ci = +el.dataset.ci;
      state.formDraft.components[ci].steps.push('');
      state.focusAfterRender = `[name="step-${ci}-${state.formDraft.components[ci].steps.length-1}"]`;
      render();
    }
    else if(act === 'rmstep'){
      syncDraftFromForm();
      const c = state.formDraft.components[+el.dataset.ci];
      if(c.steps.length>1) c.steps.splice(+el.dataset.si,1);
      render();
    }
    else if(act === 'saverecipe'){
      syncDraftFromForm();
      const d = state.formDraft;
      if(!d.title.trim()){ state.formError = 'Geef het recept een naam.'; render(); return; }
      const nTitle = normalize(d.title);
      const dup = state.recipes.some(r => normalize(r.title) === nTitle && r.id !== state.formEditingId);
      if(dup){
        state.formError = `"${d.title.trim()}" staat al in je receptenkast. Kies een andere naam, of ga naar dat recept om het te bewerken.`;
        render();
        return;
      }
      state.formError = null;
      const recipe = {...d, id: state.formEditingId || uid()};
      await saveRecipeDoc(recipe);
      state.formDraft = null; state.formEditingId = null;
      render();
    }
    else if(act === 'askdelete'){ state.confirm = {msg:'Dit recept verwijderen? Dit kan niet ongedaan worden gemaakt.', id: el.dataset.id, action:'deleterecipe'}; render(); }
    else if(act === 'cancelconfirm'){ state.confirm = null; state.pendingRestore = null; render(); }
    else if(act === 'doconfirm'){
      if(state.confirm.action === 'restorebackup'){
        const data = state.pendingRestore;
        try{
          const [existingRecipes, existingWeekplans] = await Promise.all([
            getDocs(householdCol('recipes')), getDocs(householdCol('weekplans'))
          ]);
          await Promise.all(existingRecipes.docs.map(d => deleteDoc(d.ref)));
          await Promise.all(existingWeekplans.docs.map(d => deleteDoc(d.ref)));

          const newRecipes = Array.isArray(data.recipes) ? data.recipes : [];
          const newPantry = Array.isArray(data.pantry) ? data.pantry : [];
          const newVoorraadkast = Array.isArray(data.voorraadkast) ? data.voorraadkast : [];
          const newWeekplans = (data.weekplans && typeof data.weekplans === 'object') ? data.weekplans : {};
          Object.values(newWeekplans).forEach(wp => { if(!Array.isArray(wp.ownedNames)) wp.ownedNames = []; if(!Array.isArray(wp.items)) wp.items = []; });

          await Promise.all(newRecipes.map(r => setDoc(householdRef('recipes', r.id), r)));
          await Promise.all(Object.entries(newWeekplans).map(([key, wp]) => setDoc(householdRef('weekplans', key), wp)));
          await setDoc(householdRef('meta','pantry'), {items: newPantry});
          await setDoc(householdRef('meta','voorraadkast'), {items: newVoorraadkast});
        }catch(e){
          console.error('herstellen mislukt', e);
          state.backupError = 'Herstellen is niet gelukt — controleer je internetverbinding en probeer het opnieuw.';
        }
        state.pendingRestore = null;
        state.backupOpen = false;
      } else {
        await deleteRecipeDoc(state.confirm.id);
        state.detailId = null;
      }
      state.confirm = null;
      render();
    }
    else if(act === 'openbackup'){ state.backupOpen = true; state.backupError = null; render(); }
    else if(act === 'closebackup'){ state.backupOpen = false; state.backupError = null; render(); }
    else if(act === 'doexport'){ doExportBackup(); }
    else if(act === 'addpantry'){ addPantryFromInput(); }
    else if(act === 'rmpantry'){ state.pantry.splice(+el.dataset.i,1); await savePantry(); render(); }
    else if(act === 'weekprev'){ const d=new Date(state.currentMonday); d.setDate(d.getDate()-7); state.currentMonday=mondayOf(d); render(); }
    else if(act === 'weeknext'){ const d=new Date(state.currentMonday); d.setDate(d.getDate()+7); state.currentMonday=mondayOf(d); render(); }
    else if(act === 'openpicker'){ state.pickerOpen = true; render(); }
    else if(act === 'closepicker'){ state.pickerOpen = false; render(); }
    else if(act === 'addtoweek'){
      const key = weekKeyFor(state.currentMonday);
      const wp = getWeekplan(key);
      wp.items.push({id: uid(), recipeId: el.dataset.id, kellyScore: null});
      await saveWeekplanDoc(key);
      state.pickerOpen = false;
      render();
    }
    else if(act === 'rmplanitem'){
      const key = el.dataset.key;
      const wp = getWeekplan(key);
      wp.items = wp.items.filter(it => it.id !== el.dataset.itemid);
      await saveWeekplanDoc(key);
      render();
    }
    else if(act === 'openimport'){ state.importOpen = true; state.importError = null; render(); }
    else if(act === 'closeimport'){ if(!state.importLoading){ state.importOpen = false; state.importError = null; render(); } }
    else if(act === 'doimport'){ await doImportRecipe(); }
    else if(act === 'openvoorraadkast'){ state.voorraadkastOpen = true; state.voorraadDupError = null; render(); }
    else if(act === 'closevoorraadkast'){ state.voorraadkastOpen = false; state.voorraadDupError = null; render(); }
    else if(act === 'addvoorraad'){ addVoorraadFromInput(); }
    else if(act === 'rmvoorraad'){ state.voorraadkast.splice(+el.dataset.i,1); state.voorraadDupError = null; await saveVoorraadkast(); render(); }
    else if(act === 'togglemonth'){ state.monthOverviewOpen = !state.monthOverviewOpen; render(); }
    else if(act === 'togglemonthrow'){
      const mk = el.dataset.mk;
      const i = state.expandedMonths.indexOf(mk);
      if(i>=0) state.expandedMonths.splice(i,1); else state.expandedMonths.push(mk);
      render();
    }
    else if(act === 'unlock'){ tryUnlock(); }
  });

  document.addEventListener('change', async (e) => {
    const el = e.target;
    if(el.dataset.act === 'toggleweekowned'){
      const key = el.dataset.key;
      const wp = getWeekplan(key);
      const k = el.dataset.ingkey;
      if(el.checked){ if(!wp.ownedNames.includes(k)) wp.ownedNames.push(k); }
      else { wp.ownedNames = wp.ownedNames.filter(n => n !== k); }
      await saveWeekplanDoc(key);
      render();
    }
    else if(el.dataset.act === 'setkelly'){
      const key = el.dataset.key;
      const wp = getWeekplan(key);
      const item = wp.items.find(it => it.id === el.dataset.itemid);
      let v = el.value === '' ? null : Math.max(0, Math.min(10, parseFloat(el.value)));
      item.kellyScore = v;
      await saveWeekplanDoc(key);
      render();
    }
    else if(el.dataset.act === 'setdatefrom'){ state.dateFrom = el.value; render(); }
    else if(el.dataset.act === 'setdateto'){ state.dateTo = el.value; render(); }
    else if(el.dataset.act === 'uploadphoto'){
      const file = el.files[0];
      if(!file) return;
      try{
        const dataUrl = await compressImage(file);
        syncDraftFromForm();
        state.formDraft.photo = dataUrl;
        render();
      }catch(err){ alert('Foto uploaden is niet gelukt, probeer een andere foto.'); }
    }
    else if(el.dataset.act === 'restorebackupfile'){
      const file = el.files[0];
      if(!file) return;
      try{
        const text = await file.text();
        const data = JSON.parse(text);
        if(!data || !Array.isArray(data.recipes)){ throw new Error('ongeldig bestand'); }
        state.pendingRestore = data;
        state.backupError = null;
        state.confirm = {
          msg: `Dit vervangt al je huidige recepten, voorraad en planning door deze back-up (${data.recipes.length} recept${data.recipes.length===1?'':'en'}${data.exportedAt ? ', geëxporteerd op ' + formatDateNL(data.exportedAt.slice(0,10)) : ''}). Weet je het zeker?`,
          action: 'restorebackup',
          confirmLabel: 'Herstellen'
        };
        render();
      }catch(err){
        state.backupError = 'Dit bestand kon niet gelezen worden — controleer of het een geëxporteerde back-up (.json) is.';
        render();
      }
      el.value = '';
    }
  });

  document.addEventListener('keydown', (e) => {
    if(e.target && e.target.id === 'pantryInput' && e.key === 'Enter'){ e.preventDefault(); addPantryFromInput(); }
    if(e.target && e.target.id === 'voorraadInput' && e.key === 'Enter'){ e.preventDefault(); addVoorraadFromInput(); }
    if(e.target && e.target.id === 'pwInput' && e.key === 'Enter'){ e.preventDefault(); tryUnlock(); }
  });

  function tryUnlock(){
    const input = document.getElementById('pwInput');
    if(!input) return;
    if(input.value === APP_PASSWORD){
      localStorage.setItem('kp_unlocked', '1');
      state.unlocked = true;
      state.passwordError = null;
      render();
      startSync();
    } else {
      state.passwordError = 'Onjuist wachtwoord.';
      render();
      const again = document.getElementById('pwInput');
      if(again) again.focus();
    }
  }

  async function addPantryFromInput(){
    const input = document.getElementById('pantryInput');
    if(!input) return;
    const v = input.value.trim();
    if(!v) return;
    state.pantry.push(v);
    await savePantry();
    render();
    const again = document.getElementById('pantryInput');
    if(again) again.focus();
  }

  async function addVoorraadFromInput(){
    const input = document.getElementById('voorraadInput');
    if(!input) return;
    const v = input.value.trim();
    if(!v) return;
    const nv = normalize(v);
    const exists = state.voorraadkast.some(x => normalize(x) === nv);
    if(exists){
      state.voorraadDupError = `"${v}" staat al in de voorraadkast.`;
      render();
      const again = document.getElementById('voorraadInput');
      if(again) again.focus();
      return;
    }
    state.voorraadDupError = null;
    state.voorraadkast.push(v);
    await saveVoorraadkast();
    render();
    const again = document.getElementById('voorraadInput');
    if(again) again.focus();
  }

  if(state.unlocked){ startSync(); } else { render(); }
})();
</script>
<script>
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js", { scope: "./" });
</script>
</body>
</html>
